name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: gitsync
            package_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: gitsync.exe
            package_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/gitsync
          tar -czf gitsync-${{ matrix.target }}.tar.gz -C dist gitsync

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/gitsync.exe"
          Compress-Archive -Path dist/gitsync.exe -DestinationPath "gitsync-${{ matrix.target }}.zip" -Force

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gitsync-x86_64-unknown-linux-gnu
          path: gitsync-x86_64-unknown-linux-gnu.tar.gz

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gitsync-x86_64-pc-windows-msvc
          path: gitsync-x86_64-pc-windows-msvc.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: gitsync-x86_64-unknown-linux-gnu
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: gitsync-x86_64-pc-windows-msvc
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/*.tar.gz
            artifacts/windows/*.zip